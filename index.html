// ─── MINI CHART ───────────────────────────────────────────────────
function miniChart(data,color,baseline){
  if(!data||data.length<1)return `<div style="height:60px;display:flex;align-items:center;justify-content:center;color:#7A8499;font-size:11px">Log a reading to see chart</div>`;
  const allVals=[parseFloat(baseline),...data.map(d=>parseFloat(d.val))];
  const min=Math.min(...allVals)*0.995,max=Math.max(...allVals)*1.005;
  const range=max-min||1;
  const W=300,H=70,PAD=10;
  const pts=[{val:baseline,label:'Start'},...data].map((d,i,arr)=>({
    x:PAD+(i/Math.max(arr.length-1,1))*(W-PAD*2),
    y:H-PAD-((parseFloat(d.val)-min)/range)*(H-PAD*2),
    val:d.val,label:d.label||'Start',
  }));
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const fillD=`${pathD} L ${pts[pts.length-1].x} ${H} L ${pts[0].x} ${H} Z`;
  const gid=`g${color.replace('#','')}`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:70px">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
    </linearGradient></defs>
    <path d="${fillD}" fill="url(#${gid})"/>
    <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
    ${pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="${i===0?'#7A8499':color}"/>`).join('')}
    <text x="${pts[0].x}" y="${H-1}" text-anchor="middle" font-size="8" fill="#7A8499">Start</text>
    ${pts.length>1?`<text x="${pts[pts.length-1].x}" y="${H-1}" text-anchor="middle" font-size="8" fill="${color}">Now</text>`:''}
  </svg>`;
}

// ─── PROGRESS RING ────────────────────────────────────────────────
function progressRing(pct,size,stroke,color){
  const r=size/2-stroke;
  const circ=2*Math.PI*r;
  const offset=circ-(pct/100)*circ;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1E2230" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
  </svg>`;
}

// ─── SCALE TRACKER ────────────────────────────────────────────────
function getCurrentVals(){
  if(scaleHistory.length>0)return scaleHistory[scaleHistory.length-1].vals;
  return Object.fromEntries(SCALE_METRICS.map(s=>[s.key,s.baseline]));
}
function getDelta(key,current){
  const m=SCALE_METRICS.find(x=>x.key===key);
  const curr=parseFloat(current),base=parseFloat(m.baseline);
  if(curr===base)return null;
  const delta=curr-base;
  const isGood=m.goodDir==='down'?delta<0:delta>0;
  return{text:(delta>0?'+':'')+delta.toFixed(1),isGood};
}
function getStatus(m,val){
  const v=parseFloat(val),t=m.target;
  if(m.goodDir==='down')return v<=t?'On track':v<=t*1.1?'Getting there':'Needs work';
  return v>=t?'On track':v>=t*0.95?'Getting there':'Needs work';
}
function getStatusColor(m,val){
  const v=parseFloat(val),t=m.target;
  if(m.goodDir==='down')return v<=t?'#C8F135':v<=t*1.1?'#F5A623':'#FF5A5A';
  return v>=t?'#C8F135':v>=t*0.95?'#F5A623':'#FF5A5A';
}

function getPrevBest(d,e,w){
  if(w<=1)return null;
  const ex=WORKOUT[d].exercises[e];
  if(ex.isPlates){
    const plates=Array.from({length:ex.sets},(_,s)=>parseFloat(getLog(mk(d,e,w-1,s,'plates'))||0)).filter(Boolean);
    const reps=Array.from({length:ex.sets},(_,s)=>parseInt(getLog(mk(d,e,w-1,s,'reps'))||0)).filter(Boolean);
    if(!plates.length)return null;
    const maxP=Math.max(...plates);const idx=plates.indexOf(maxP);
    return{bestKg:maxP,bestReps:reps[idx]||0,isPlates:true};
  }
  if(ex.special){
    const prevMode=getLog(modeKey(d,e,w-1))||'bodyweight';
    if(prevMode==='bodyweight'){
      const reps=Array.from({length:ex.sets},(_,s)=>parseInt(getLog(mk(d,e,w-1,s,'reps'))||0)).filter(Boolean);
      return reps.length?{bestReps:Math.max(...reps),bestKg:0,mode:'bodyweight'}:null;
    } else if(prevMode==='assisted'){
      const kgs=Array.from({length:ex.sets},(_,s)=>parseFloat(getLog(mk(d,e,w-1,s,'kg'))||0)).filter(Boolean);
      const reps=Array.from({length:ex.sets},(_,s)=>parseInt(getLog(mk(d,e,w-1,s,'reps'))||0)).filter(Boolean);
      if(!kgs.length)return null;
      const minKg=Math.min(...kgs);const idx=kgs.indexOf(minKg);
      return{bestKg:minKg,bestReps:reps[idx]||0,mode:'assisted'};
    } else {
      const kgs=Array.from({length:ex.sets},(_,s)=>parseFloat(getLog(mk(d,e,w-1,s,'kg'))||0)).filter(Boolean);
      const reps=Array.from({length:ex.sets},(_,s)=>parseInt(getLog(mk(d,e,w-1,s,'reps'))||0)).filter(Boolean);
      if(!kgs.length)return null;
      const maxKg=Math.max(...kgs);const idx=kgs.indexOf(maxKg);
      return{bestKg:maxKg,bestReps:reps[idx]||0,mode:'weighted'};
    }
  }
  const kgs=Array.from({length:ex.sets},(_,s)=>parseFloat(getLog(mk(d,e,w-1,s,'kg'))||0)).filter(Boolean);
  const reps=Array.from({length:ex.sets},(_,s)=>parseInt(getLog(mk(d,e,w-1,s,'reps'))||0)).filter(Boolean);
  if(!kgs.length)return null;
  const maxKg=Math.max(...kgs);const idx=kgs.indexOf(maxKg);
  return{bestKg:maxKg,bestReps:reps[idx]||0};
}

function getCurrBest(d,e,w){
  const ex=WORKOUT[d].exercises[e];
  const key=ex.isPlates?'plates':'kg';
  const vals=Array.from({length:ex.sets},(_,s)=>parseFloat(getLog(mk(d,e,w,s,key))||0)).filter(Boolean);
  const reps=Array.from({length:ex.sets},(_,s)=>parseInt(getLog(mk(d,e,w,s,'reps'))||0)).filter(Boolean);
  if(!vals.length&&!reps.length)return null;
  const maxV=vals.length?Math.max(...vals):0;
  const idx=vals.indexOf(maxV);
  return{bestKg:maxV,bestReps:reps[idx]||Math.max(...(reps.length?reps:[0]))||0};
}

function formatPrevRef(prev,ex,mode){
  if(!prev)return null;
  if(ex.isPlates)return `Last week: ${prev.bestKg} plates × ${prev.bestReps} reps`;
  if(ex.special){
    const m=prev.mode||mode;
    if(m==='bodyweight')return `Last week: ${prev.bestReps} reps bodyweight`;
    if(m==='assisted')return `Last week: ${prev.bestKg}kg assist × ${prev.bestReps} reps`;
    return `Last week: +${prev.bestKg}kg × ${prev.bestReps} reps`;
  }
  return `Last week: ${prev.bestKg}kg × ${prev.bestReps} reps`;
}

function getPRStatus(prev,curr,ex,mode){
  if(!prev||!curr)return null;
  if(ex.isPlates){
    if(curr.bestKg>prev.bestKg)return{type:'weight',label:'Plate PR — more plates!'};
    if(curr.bestKg===prev.bestKg&&curr.bestReps>prev.bestReps)return{type:'rep',label:'Rep PR — same plates more reps!'};
    if(curr.bestKg<prev.bestKg)return{type:'down',label:'Below last week'};
    return{type:'same',label:'Same as last week'};
  }
  if(ex.special){
    if(mode==='bodyweight'){
      if(curr.bestReps>prev.bestReps)return{type:'rep',label:'Rep PR — more reps bodyweight!'};
      return null;
    } else if(mode==='assisted'){
      if(curr.bestKg<prev.bestKg)return{type:'weight',label:'PR — less assistance needed!'};
      if(curr.bestKg===prev.bestKg&&curr.bestReps>prev.bestReps)return{type:'rep',label:'Rep PR — same assist more reps!'};
      return null;
    } else {
      if(curr.bestKg>prev.bestKg)return{type:'weight',label:'Weight PR — more weight!'};
      if(curr.bestKg===prev.bestKg&&curr.bestReps>prev.bestReps)return{type:'rep',label:'Rep PR — same weight more reps!'};
      return null;
    }
  }
  if(curr.bestKg>prev.bestKg)return{type:'weight',label:'Weight PR — new best!'};
  if(curr.bestKg===prev.bestKg&&curr.bestReps>prev.bestReps)return{type:'rep',label:'Rep PR — more reps at same weight!'};
  if(curr.bestKg<prev.bestKg)return{type:'down',label:'Below last week'};
  return{type:'same',label:'Same as last week'};
}

function isSuppDone(id){return !!suppData[`${todayStr()}_${id}`]}
function toggleSuppFn(id){

function isMealDone(id){return !!nutrData[`${todayStr()}_meal_${id}`]}
function toggleMealFn(id){

  saveJ(NK,nutrData);

}
function isVitDDoneThisWeek(){
  const d=new Date();const day=d.getDay();
  const diff=day===0?0:day;
  const sun=new Date(d);sun.setDate(d.getDate()-diff);
  const sunStr=sun.toISOString().split('T')[0];
  return !!suppData[`${sunStr}_vitd`];
}
function toggleVitD(){
  const d=new Date();const day=d.getDay();
  const diff=day===0?0:day;
  const sun=new Date(d);sun.setDate(d.getDate()-diff);
  const sunStr=sun.toISOString().split('T')[0];
  const k=`${sunStr}_vitd`;
  suppData[k]=!suppData[k];
  saveJ(SUK,suppData);
  render();
}
function getVitDWeeksTaken(){
  let count=0;
  const d=new Date();
  // Go back up to 15 weeks to count all taken Sundays
  for(let i=0;i<15;i++){
    const check=new Date(d);
    // Find the Sunday of week i weeks ago
    const day=check.getDay();
    const diff=day===0?0:day;
    check.setDate(d.getDate()-diff-(i*7));
    const sunStr=check.toISOString().split('T')[0];
    if(suppData[`${sunStr}_vitd`])count++;
  }
  return Math.min(count,10);
}
function getSuppStreak(id){
  let streak=0;const d=new Date();
  for(let i=0;i<100;i++){
    const k=`${d.toISOString().split('T')[0]}_${id}`;
    if(suppData[k]){streak++;d.setDate(d.getDate()-1);}else break;
  }
  return streak;
}
